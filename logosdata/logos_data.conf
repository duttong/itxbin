# logos_data.conf
# Author-managed UI configuration for the logos_data application.
# Edit this file to control instrument-specific UI behaviour.
# Do NOT modify for per-user preferences — use ~/.logos_data_user.conf instead.

[instrument.m4]
# Comma-separated visible tabs: processing, timeseries, tanks, ai
tabs = processing, timeseries, tanks, ai
# Name of the analyte selected on startup (must match key in analyte combobox/buttons)
default_analyte = HFC134a
# Show "Save run to .csv file" button on the Processing tab
csv_export = false
# Show "Change Run Type" control on the Processing tab
change_run_type = false

[instrument.fe3]
tabs = processing, timeseries, tanks, ai
default_analyte = CFC11 (a)
csv_export = false
change_run_type = true

[instrument.ie3]
tabs = processing, timeseries, tanks, ai
default_analyte = N2O (a)
csv_export = false
change_run_type = false

[instrument.bld1]
# BLD1: processing and timeseries only
tabs = processing, timeseries
default_analyte = SF6
csv_export = true
change_run_type = true

[instrument.pr1]
tabs = processing, timeseries, tanks, ai
default_analyte =
csv_export = false
change_run_type = false
